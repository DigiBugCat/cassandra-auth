when:
  - event: [push, pull_request]

steps:
  # ── CI: tests (all branches, push + PR) ──
  - name: test
    image: ghcr.io/astral-sh/uv:python3.13-alpine
    commands:
      - cd service
      - uv sync --extra dev
      - SCHEMA_PATH=$PWD/schema.sql MODEL_PATH=$PWD/model.conf uv run pytest -v
    when:
      event: [push, pull_request]

  # ── CD: build + push (main only) ──
  - name: build-and-push
    image: moby/buildkit:v0.21.1
    commands:
      - |
        buildctl --addr tcp://buildkitd.buildkitd.svc.cluster.local:1234 \
          build \
          --frontend dockerfile.v0 \
          --local context=service \
          --local dockerfile=service \
          --opt build-arg:AUTH_YAML_CONTENT="$AUTH_YAML_CONTENT" \
          --output type=image,name=172.20.0.161:30500/cassandra-auth:latest,push=true,registry.insecure=true
    environment:
      AUTH_YAML_CONTENT:
        from_secret: auth_yaml
    when:
      branch: main
      event: push

  - name: restart-deployment
    image: bitnami/kubectl:latest
    commands:
      - kubectl rollout restart deployment auth -n production
    when:
      branch: main
      event: push
